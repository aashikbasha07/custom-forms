<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Custom Forms Complete Example</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body {
      padding: 30px;
    }
    .section {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <h2 class="mb-4">Bootstrap 4 Custom Forms Full Example</h2>

  <!-- 1. Custom Selects -->
  <div class="section">
    <h5>Custom Select Inputs</h5>
    <select class="custom-select mb-3">
      <option selected>Open this select menu</option>
      <option value="1">Option One</option>
      <option value="2">Option Two</option>
      <option value="3">Option Three</option>
    </select>

    <select class="custom-select custom-select-lg mb-3">
      <option selected>Large custom select</option>
      <option value="1">One</option>
      <option value="2">Two</option>
    </select>

    <select class="custom-select custom-select-sm">
      <option selected>Small custom select</option>
      <option value="1">One</option>
      <option value="2">Two</option>
    </select>
  </div>

  <!-- 2. Custom Checkboxes -->
  <div class="section">
    <h5>Custom Checkboxes</h5>
    <div class="custom-control custom-checkbox mb-2">
      <input type="checkbox" class="custom-control-input" id="customCheck1">
      <label class="custom-control-label" for="customCheck1">Check this custom checkbox</label>
    </div>

    <div class="custom-control custom-checkbox mb-2">
      <input type="checkbox" class="custom-control-input" id="customCheck2" checked>
      <label class="custom-control-label" for="customCheck2">Checked custom checkbox</label>
    </div>

    <div class="custom-control custom-checkbox mb-2">
      <input type="checkbox" class="custom-control-input" id="customCheck3" disabled>
      <label class="custom-control-label" for="customCheck3">Disabled custom checkbox</label>
    </div>
  </div>

  <!-- 3. Custom Radios -->
  <div class="section">
    <h5>Custom Radio Buttons</h5>
    <div class="custom-control custom-radio mb-2">
      <input type="radio" id="customRadio1" name="customRadio" class="custom-control-input">
      <label class="custom-control-label" for="customRadio1">Custom radio 1</label>
    </div>

    <div class="custom-control custom-radio mb-2">
      <input type="radio" id="customRadio2" name="customRadio" class="custom-control-input">
      <label class="custom-control-label" for="customRadio2">Custom radio 2</label>
    </div>

    <div class="custom-control custom-radio mb-2">
      <input type="radio" id="customRadio3" name="customRadio" class="custom-control-input" disabled>
      <label class="custom-control-label" for="customRadio3">Disabled custom radio</label>
    </div>
  </div>

  <!-- 4. Custom Switches -->
  <div class="section">
    <h5>Custom Switches</h5>
    <div class="custom-control custom-switch mb-2">
      <input type="checkbox" class="custom-control-input" id="customSwitch1">
      <label class="custom-control-label" for="customSwitch1">Toggle this switch</label>
    </div>

    <div class="custom-control custom-switch mb-2">
      <input type="checkbox" class="custom-control-input" id="customSwitch2" checked>
      <label class="custom-control-label" for="customSwitch2">Switch turned on</label>
    </div>

    <div class="custom-control custom-switch mb-2">
      <input type="checkbox" class="custom-control-input" id="customSwitch3" disabled>
      <label class="custom-control-label" for="customSwitch3">Disabled switch</label>
    </div>
  </div>

  <!-- 5. Custom File Inputs -->
  <div class="section">
    <h5>Custom File Inputs</h5>
    <div class="custom-file mb-3">
      <input type="file" class="custom-file-input" id="customFile1">
      <label class="custom-file-label" for="customFile1">Choose file</label>
    </div>

    <div class="custom-file mb-3">
      <input type="file" class="custom-file-input" id="customFile2" multiple>
      <label class="custom-file-label" for="customFile2">Choose multiple files</label>
    </div>

    <div class="custom-file mb-3">
      <input type="file" class="custom-file-input" id="customFile3" disabled>
      <label class="custom-file-label" for="customFile3">Disabled file input</label>
    </div>
  </div>

  <!-- 6. Custom Range -->
  <div class="section">
    <h5>Custom Range Slider</h5>
    <input type="range" class="custom-range" min="0" max="10">
  </div>

  <!-- 7. Form Layout with Custom Controls -->
  <div class="section">
    <h5>Form with Custom Controls</h5>
    <form>
      <div class="form-group">
        <label for="exampleCustomSelect">Choose option</label>
        <select class="custom-select" id="exampleCustomSelect">
          <option selected>Open this select</option>
          <option value="1">One</option>
          <option value="2">Two</option>
        </select>
      </div>

      <div class="custom-control custom-checkbox">
        <input type="checkbox" class="custom-control-input" id="formCustomCheck">
        <label class="custom-control-label" for="formCustomCheck">Check me</label>
      </div>
    </form>
  </div>

</body>

<!-- Bootstrap 4 JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script
 src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
